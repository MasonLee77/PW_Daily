name: Playwright Tests CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '30 23 * * *'

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 26.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Create .env file
        run: |
          cat > .env << EOF
          BASE_URL=https://material.playwrightvn.com/
          TEST_USER_NAME=playwright_viet_nam
          TEST_USER_EMAIL=playwrightvietnam@gmail.com
          HEADED=false
          ACTION_TIMEOUT=10000
          NAVIGATION_TIMEOUT=30000
          EXPECT_TIMEOUT=10000
          ALLURE_RESULTS_DIR=allure-results
          EOF

      - name: Check site connectivity
        run: |
          echo "Checking https://material.playwrightvn.com/ connectivity"
          if ! curl -I --max-time 20 https://material.playwrightvn.com/ -sSf -o /dev/null; then
            echo "ERROR: https://material.playwrightvn.com/ is not reachable from this runner"
            echo "Dumping verbose curl output for debugging:"
            curl -v --max-time 20 https://material.playwrightvn.com/ || true
            exit 1
          fi

      - name: Run Playwright tests
        run: npm test
        env:
          CI: true

      - name: Generate Allure Report
        if: always()
        run: npm run allure:generate

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.node-version }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.node-version }}
          path: allure-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          path: test-results/
          retention-days: 30
